  <script>
    function toggleMenu() {
      document.getElementById("sidebar").classList.toggle("open");
      document.getElementById("overlay").classList.toggle("show");
    }

    function closeMenu() {
      document.getElementById("sidebar").classList.remove("open");
      document.getElementById("overlay").classList.remove("show");
    }

    document.querySelectorAll(".gallery-card").forEach((card) => {
      const images = card.querySelectorAll(".card-image img");

      if (!images.length) return;

      const dotsContainer = document.createElement("div");
      dotsContainer.className = "card-dots";

      function showImage(index) {
        images.forEach((img, i) => {
          img.classList.toggle("active", i === index);
        });

        dotsContainer.querySelectorAll(".dot").forEach((dot, i) => {
          dot.classList.toggle("active", i === index);
        });
      }

      images.forEach((img, index) => {
        const dot = document.createElement("span");
        dot.className = "dot";
        if (index === 0) dot.classList.add("active");

        dot.addEventListener("mouseenter", () => showImage(index));
        dot.addEventListener("click", () => showImage(index));

        dotsContainer.appendChild(dot);
      });

      const cardBody = card.querySelector(".card-body");
      card.insertBefore(dotsContainer, cardBody);
    });

    const rentalOptions = [
      "Fun House 15' x 15' x 12'",
      "Castle Toddler Combo 19' x 15' x 12'",
      "50ft Obstacle Course",
      "20ft Fun Dual Slide",
      "Generator"
    ];

    const selectionsWrap = document.getElementById("inflatableSelections");

    function getCurrentSelections() {
      return Array.from(document.querySelectorAll(".inflatable-select"))
        .map(select => select.value)
        .filter(value => value !== "");
    }

    function createOptionElement(value, text, selected = false) {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = text;
      if (selected) option.selected = true;
      return option;
    }

    function populateSelect(select, currentValue, isFirst) {
      const selectedValues = getCurrentSelections().filter(v => v !== currentValue);

      select.innerHTML = "";

      if (isFirst) {
        select.appendChild(createOptionElement("", "Select an inflatable", currentValue === ""));
      } else {
        select.appendChild(createOptionElement("", "Add another inflatable (optional)", currentValue === ""));
      }

      rentalOptions.forEach(optionValue => {
        if (!selectedValues.includes(optionValue) || optionValue === currentValue) {
          select.appendChild(
            createOptionElement(optionValue, optionValue, optionValue === currentValue)
          );
        }
      });
    }

    function refreshDropdowns() {
      const selects = Array.from(document.querySelectorAll(".inflatable-select"));

      selects.forEach((select, index) => {
        populateSelect(select, select.value, index === 0);
        select.name = `inflatable_${index + 1}`;
        if (index === 0) {
          select.required = true;
        } else {
          select.required = false;
        }
      });

      for (let i = selects.length - 1; i > 0; i--) {
        if (selects[i].value === "" && selects[i - 1].value === "") {
          selects[i].remove();
        }
      }

      const updatedSelects = Array.from(document.querySelectorAll(".inflatable-select"));
      const lastSelect = updatedSelects[updatedSelects.length - 1];

      if (lastSelect && lastSelect.value !== "") {
        const newSelect = document.createElement("select");
        newSelect.className = "inflatable-select";
        selectionsWrap.appendChild(newSelect);
        populateSelect(newSelect, "", false);
        newSelect.addEventListener("change", handleSelectChange);
      }
    }

    function handleSelectChange() {
      refreshDropdowns();
    }

    const firstSelect = document.querySelector(".inflatable-select");
    populateSelect(firstSelect, "", true);
    firstSelect.addEventListener("change", handleSelectChange);
    refreshDropdowns();
  </script>
