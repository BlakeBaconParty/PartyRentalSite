<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good News Party Rentals</title>

<style>
* { box-sizing: border-box; }

body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f7fb;
  color: #111827;
}

/* Layout */
.sidebar {
  width: 230px;
  background: #0ea5e9;
  color: white;
  height: 100vh;
  padding: 20px;
  position: fixed;
}

.sidebar a {
  display: block;
  color: white;
  text-decoration: none;
  margin: 10px 0;
}

.main {
  margin-left: 230px;
  padding: 20px;
}

/* Cards */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.08);
}

.card-image {
  position: relative;
  height: 220px;
}

.card-image img {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.card-image img.active {
  opacity: 1;
}

/* Dots */
.card-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 10px;
}

.dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #cbd5e1;
  cursor: pointer;
}

.dot.active {
  background: #0ea5e9;
}

/* Buttons */
.btn {
  display: inline-block;
  padding: 10px;
  background: #0ea5e9;
  color: white;
  text-decoration: none;
  border-radius: 6px;
}

/* Form */
form {
  display: grid;
  gap: 10px;
}

select, input, textarea {
  padding: 10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h2>Good News</h2>
  <a href="#rentals">Inflatables</a>
  <a href="#booking">Book</a>
</div>

<div class="main">

<h1>Good News Party Rentals</h1>

<section id="rentals">
<div class="grid">

<!-- CARD 1 (2 images) -->
<div class="card gallery-card">
  <div class="card-image">
    <img src="fun1.jpg" class="active">
    <img src="fun2.jpg">
  </div>
  <div class="card-body">
    <h3>Fun House</h3>
    <p>$200</p>
  </div>
</div>

<!-- CARD 2 (5 images) -->
<div class="card gallery-card">
  <div class="card-image">
    <img src="castle1.jpg" class="active">
    <img src="castle2.jpg">
    <img src="castle3.jpg">
    <img src="castle4.jpg">
    <img src="castle5.jpg">
  </div>
  <div class="card-body">
    <h3>Castle Combo</h3>
    <p>$300</p>
  </div>
</div>

</div>
</section>

<section id="booking">
<h2>Book</h2>

<form>

<div id="inflatableSelections">
<select class="inflatable-select" required>
<option value="">Select inflatable</option>
<option>Fun House</option>
<option>Castle Combo</option>
<option>Generator</option>
</select>
</div>

<textarea placeholder="Details"></textarea>
<button>Submit</button>

</form>

</section>

</div>

<script>

/* IMAGE DOT SYSTEM (AUTO) */
document.querySelectorAll(".gallery-card").forEach(card => {
  const images = card.querySelectorAll("img");
  const dotsWrap = document.createElement("div");
  dotsWrap.className = "card-dots";

  function show(i){
    images.forEach((img, idx)=> img.classList.toggle("active", idx===i));
    dotsWrap.querySelectorAll(".dot")
      .forEach((d, idx)=> d.classList.toggle("active", idx===i));
  }

  images.forEach((img,i)=>{
    const dot = document.createElement("span");
    dot.className = "dot";
    if(i===0) dot.classList.add("active");

    dot.addEventListener("mouseenter", ()=>show(i));
    dot.addEventListener("click", ()=>show(i));

    dotsWrap.appendChild(dot);
  });

  card.insertBefore(dotsWrap, card.querySelector(".card-body"));
});


/* UNLIMITED DROPDOWNS */
const options = ["Fun House","Castle Combo","Generator"];
const wrap = document.getElementById("inflatableSelections");

function addDropdown(){
  const select = document.createElement("select");
  select.className = "inflatable-select";

  select.innerHTML = `<option value="">Add another inflatable</option>` +
    options.map(o=>`<option>${o}</option>`).join("");

  select.addEventListener("change", ()=>{
    if(select.value !== "" && !select.nextElementSibling){
      addDropdown();
    }
  });

  wrap.appendChild(select);
}

document.querySelector(".inflatable-select")
.addEventListener("change", addDropdown);

</script>

</body>
</html>
